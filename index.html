<!doctype html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <!-- Erişilebilirlik: kullanıcı yakınlaştırma kısıtlanmaz -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Oyuncak - Oyun Dünyası</title>
  <meta name="description"
    content="18+ oyun, serbest çizim ve interaktif hikayeler. Reklamsız, güvenli, hızlı çocuk oyunları platformu." />

  <link rel="icon" type="image/png" href="%BASE_URL%favicon.png" />
  <link rel="apple-touch-icon" href="%BASE_URL%favicon.png" />
  <link rel="manifest" href="%BASE_URL%manifest.json" />
  <link rel="canonical" href="https://oyuncak.app/" />

  <!-- Font preconnect + preload (render-blocking @import yerine) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap"
    media="print" onload="this.media='all'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Sora:wght@600;700;800&display=swap" />
  </noscript>

  <!-- PWA & Mobile App Meta -->
  <meta name="theme-color" content="#0f1219" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Oyuncak" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-TileColor" content="#0f1219" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Open Graph -->
  <meta property="og:site_name" content="Oyuncak" />
  <meta property="og:title" content="Oyuncak - Oyun Dünyası" />
  <meta property="og:description" content="18+ oyun, serbest çizim ve interaktif hikayeler!" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://oyuncak.app/" />
  <meta property="og:image" content="https://oyuncak.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="tr_TR" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Oyuncak - Oyun Dünyası" />
  <meta name="twitter:description" content="18+ oyun, serbest çizim ve interaktif hikayeler!" />
  <meta name="twitter:image" content="https://oyuncak.app/og-image.png" />

  <!-- Yapılandırılmış veri: WebApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Oyuncak",
    "description": "Reklamsız, güvenli ve hızlı çocuk oyunları platformu. 18+ interaktif oyun, çizim ve hikayeler.",
    "url": "https://oyuncak.app/",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Any",
    "inLanguage": "tr-TR",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "TRY"
    }
  }
  </script>

  <!-- Splash screen color while loading + old device fallbacks -->
  <style>
    html,
    body,
    #root {
      margin: 0;
      padding: 0;
      background: #0f1219;
      min-height: 100vh;
      min-height: 100dvh;
      overscroll-behavior: none;
      -ms-overflow-style: none;
    }

    body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Erişilebilir odak: klavye kullanıcıları için görünür halka */
    :focus-visible {
      outline: 2px solid #00d4ff;
      outline-offset: 2px;
      border-radius: 4px;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f1219;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #00d4ff;
    }

    #app-loader .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(0, 212, 255, 0.2);
      border-top-color: #00d4ff;
      border-radius: 50%;
      -webkit-animation: spin 0.8s linear infinite;
      animation: spin 0.8s linear infinite;
    }

    #app-loader p {
      margin-top: 16px;
      font-size: 14px;
      opacity: 0.7;
    }

    @-webkit-keyframes spin {
      to {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="app-loader" role="status" aria-live="polite" aria-label="Uygulama yükleniyor">
    <div class="spinner" aria-hidden="true"></div>
    <p>Yükleniyor...</p>
  </div>

  <div id="root"></div>

  <script>
    window.__appLoadTimer = setTimeout(function () {
      var loader = document.getElementById('app-loader');
      if (!loader) return;
      loader.innerHTML =
        '<p style="color:#ff6b6b;font-size:15px;text-align:center;padding:2rem;line-height:1.6">' +
        'Bağlantı yavaş veya bir hata oluştu.<br>' +
        '<a href="javascript:location.reload(true)" ' +
        'style="color:#00d4ff;text-decoration:none;font-weight:bold;display:inline-block;margin-top:12px;' +
        'border:1px solid #00d4ff;padding:8px 20px;border-radius:20px">Yeniden Dene</a>' +
        '</p>';
    }, 12000);
  </script>

  <script type="module" src="%BASE_URL%src/main.tsx"></script>

  <noscript>
    <div
      style="padding:2rem;text-align:center;color:#fff;background:#0f1219;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;">
      <h1 style="font-size:1.5rem;margin-bottom:1rem;">🎮 Oyuncak</h1>
      <p>Bu uygulamayı kullanmak için JavaScript'i etkinleştirmeniz gerekiyor.</p>
    </div>
  </noscript>
</body>

</html>
